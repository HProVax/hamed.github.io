    <h2>Global Standards Shaping My Biology Career</h2>
    <p>By adhering to these standards, I am able to stay updated on the latest advancements in the field, ensuring that my knowledge and skills remain relevant and competitive. These standards have shaped my approach to disease pathogenesis, genetic analysis, and public health safety, guiding my work to meet the strictest global protocols.</p><!--item1--><div class="radio-section-row-title"><a href="https://www.woah.org/en/who-we-are/"><p>WOAH - World Organisation for Animal Health</p></a><a href="https://www.federalregister.gov/documents/2006/10/13/E6-17025/international-sanitary-and-phytosanitary-standard-setting-activities"><p>CFR - Animal and Plant Health Inspection Service</p></a><a href="https://www.cdc.gov/labs/bmbl/index.html"><p>CDC - DISEASE CONTROL AND PREVENTION</p></a></div><div class="radio-section-row"><div class="box"><div class="hexagon">
        <a href="https://doc.woah.org/dyn/portal/listalo.xhtml?dos=72&amp;page=listalo&amp;req=122&amp;menu="><img src="images/woah_tag.png"></a>
        <div class="face1"></div>
        <div class="face2"></div>
      </div></div><div class="radio-section-row-desc"><h8><a href="https://www.woah.org/en/home/#searchform-header">The World Organisation for Animal Health (WOAH [formerly, OIE])</a> Terrestrial and Aquatic Animal Health Codes provide standards for the improvement of animal health and welfare and veterinary public health worldwide and zoonoses, including through standards for safe international trade in terrestrial and aquatic animals and their products. The manuals provide a standardised approach to the diagnosis of the diseases listed in the Terrestrial and Aquatic Codes [<a href="https://doc.woah.org/dyn/portal/digidoc.xhtml?statelessToken=NXAQHZrhgc6QNB0UV7Xm0Wrqu8fmSeCL5XiynEiSrMQ=&amp;actionMethod=dyn%2Fportal%2Fdigidoc.xhtml%3AdownloadAttachment.openStateless">Link 1</a>,&nbsp;<a href="https://doc.woah.org/dyn/portal/digidoc.xhtml?statelessToken=Eid5jFc2Akq7ajfo6VvkPCSSmTGo6heX7_zLG6TP9Ko=&amp;actionMethod=dyn%2Fportal%2Fdigidoc.xhtml%3AdownloadAttachment.openStateless">Link 2</a>].</h8></div><p></p><!--item2--><div class="box"><div class="hexagon">
        <a href="#"><img src="images/eCFR_logo.png" class="cfr-logo-filter"></a>
        <div class="face1"></div>
        <div class="face2"></div>
      </div></div>
      <div class="radio-section-row-desc"><h8><a href="https://www.aphis.usda.gov/veterinary-services">The Animal and Plant Health Inspection Service</a> was reestablished by the Secretary of Agriculture on March 14, 1977, pursuant to authority contained in 5 U.S.C. 301 and Reorganization Plan No. 2 of 1953 (5 U.S.C. app.). The Service was established to conduct regulatory and control programs to protect and improve animal and plant health for the benefit of man and the environment. The United States (
i.e., USDA/APHIS) intends to review and, where appropriate, comment on all draft chapters and revisions of WOAH (OIE) Code chapters, once it receives them from the WOAH <a href="https://www.federalregister.gov/agencies/animal-and-plant-health-inspection-service">Link 1</a>. <a href="https://www.federalregister.gov/documents/2006/10/13/E6-17025/international-sanitary-and-phytosanitary-standard-setting-activities">Link 2</a>.</h8></div><!--item3--><div class="box"><div class="hexagon">
        <img src="images/cdc-logo.png">
        <div class="face1"></div>
        <div class="face2"></div>
      </div></div><div class="radio-section-row-desc"><h8>Laboratories of CDC’s <a href="https://archive.cdc.gov/#/details?url=https://www.cdc.gov/ncezid/what-we-do/our-topics/lab-expertise.html">National Center for Emerging and Zoonotic Infectious Diseases (NCEZID)</a> provide national and global leadership in the identification, prevention, and control of emerging and zoonotic infectious diseases. NCEZID laboratories serve as vital reference laboratories for the United States and the world, aiding in critical disease detection, outbreak investigation, staff training, and public health research. In addition to managing the Laboratory Response Network, NCEZID provides oversight for a number of highly specialized laboratories. (<a href="https://www.cdc.gov/labs/pdf/SF__19_308133-A_BMBL6_00-BOOK-WEB-final-3.pdf">Link</a>).</h8></div></div><p></p><!--item4--><div class="radio-section-row-title"><a href="https://www.iso.org/ISO-IEC-17025-testing-and-calibration-laboratories.html"><p>ISO/IEC 17025 - Testing and calibration laboratories</p></a><a href="https://www.fda.gov/about-fda"><p>FDA - Food and Drug Administration</p></a><a href="https://eur-lex.europa.eu/eli/reg/2017/625/oj"><p>EU - THE EUROPEAN PARLIAMENT</p></a></div><div class="radio-section-row"><div class="box"><div class="hexagon">
        <a href="https://anab.ansi.org/standard/iso-iec-17025/?srsltid=AfmBOoppCaFKkFahCksZHP4lnfg4CpRLOapvjhbycegc_HFrNl4t4MmP"><img src="images/ISO-17025-2.png"></a>
        <div class="face1"></div>
        <div class="face2"></div>
      </div></div><div class="radio-section-row-desc"><h8>ISO/IEC 17025 enables laboratories to demonstrate that they operate competently and generate valid results, thereby promoting confidence in their work both nationally and around the world. It also helps facilitate cooperation between laboratories and other bodies by generating wider acceptance of results between countries. Test reports and certificates can be accepted from one country to another without the need for further testing, which, in turn, improves international trade, <a href="https://www.iso.org/standard/66912.html">Link</a>.</h8></div><p></p><!--item5--><div class="box"><div class="hexagon">
        <a href="https://www.federalregister.gov/documents/2024/05/06/2024-08935/medical-devices-laboratory-developed-tests"><img src="images/FDA.png"></a>
        <div class="face1"></div>
        <div class="face2"></div>
      </div></div><div class="radio-section-row-desc"><h8>The Food and Drug Administration is responsible for protecting the public health by ensuring the safety, efficacy, and security of human and veterinary drugs, biological products, and medical devices; and by ensuring the safety of our nation's food supply, cosmetics, and products that emit radiation. FDA is responsible for advancing the public health by helping to speed innovations that make medical products more effective, safer, and more affordable and by helping the public get the accurate, science-based information they need to use medical products and foods to maintain and improve their health, <a href="https://www.fda.gov/medical-devices/in-vitro-diagnostics/laboratory-developed-tests">Link 1</a>, <a href="https://www.accessdata.fda.gov/scripts/cdrh/cfdocs/cfcfr/CFRSearch.cfm?CFRPart=58">Link 2</a>, <a href="https://www.fda.gov/food/laboratory-methods-food/bacteriological-analytical-manual-bam">Link3</a>.</h8></div><!--item6--><div class="box"><div class="hexagon">
       <a href="https://eur-lex.europa.eu/eli/reg/2016/429/2021-04-21"> <img src="images/EU_2.jpg" style="border-radius: 100%;"></a>
        <div class="face1"></div>
        <div class="face2"></div>
      </div></div><div class="radio-section-row-desc"><h8>They intend to make Europe a healthier and safer place. Their mission is to protect the citizens’ health and monitor their food making sure it is safe. they aim to:
Build a strong European Health Union to protect and improve public health, ensure Europe's food is sustainable and safe, protect the health and welfare of farm animals, protect the health of crops and forests

 The legislation concerning the designation and tasks of the European Union Reference Laboratories and the European Union Reference Centres is Regulation (EU) No 2017/625 starting 29 April 2018. (<a href="https://www.cdc.gov/labs/pdf/SF__19_308133-A_BMBL6_00-BOOK-WEB-final-3.pdf">Link</a>).</h8></div></div><p></p><!--item7--><div class="radio-section-row-title"><a href="https://www.fao.org/fao-who-codexalimentarius/about-codex/tr/"><p>FAO/WHO- C O D E X  A L I M E N T A R I U S</p></a><a href="https://www.usp.org/about"><p>U.S. Pharmacopeia - USP Biologics™</p></a><a href="https://www.pharmacopoeia.com/about-us/the-bp/what-is-the-bp"><p>British Pharmacopoeia - BP</p></a></div><div class="radio-section-row"><div class="box"><div class="hexagon"><a href="https://www.fao.org/fao-who-codexalimentarius/codex-texts/list-standards/en/">
        <img src="images/FAO.png"></a>
        <div class="face1"></div>
        <div class="face2"></div>
      </div></div><div class="radio-section-row-desc"><h8>The World Health Organization (WHO) plays a key role as an intergovernmental organization in preventing food-related diseases and enhancing global food safety and security. Its initiatives include offering independent scientific advice on foodborne hazards, establishing international food standards in collaboration with the Food and Agricultural Organization (FAO) of the United Nations through the Codex Alimentarius Commission, and supporting Member States with policy guidance and the creation of laboratory and regulatory networks to share knowledge and strengthen capacities <a href="https://www.fao.org/4/i3535e/i3535e.pdf">Link</a>.</h8></div><p></p><!--item8--><div class="box"><div class="hexagon"><a href="https://www.usp.org/biologics">
        <img src="images/USP-logo.png"></a>
        <div class="face1"></div>
        <div class="face2"></div>
      </div></div><div class="radio-section-row-desc"><h8>USP is an independent, scientific nonprofit organization focused on building trust in the supply of safe, quality medicines. They are working to strengthen the global supply chain so that the medicines people rely on for health are available when needed and work as expected.

For over 200 years, USP has worked to build trust where it matters most: in the world's medicines, dietary supplements and foods. Through our rigorous science and the public quality standards we set, USP helps protect patient safety and improve the health of people around the world.</h8></div><!--item9--><div class="box"><div class="hexagon"><a href="https://www.pharmacopoeia.com/the-bp/how-to-use">
        <img src="images/BPharm.png" class="cfr-logo-filter"></a>
        <div class="face1"></div>
        <div class="face2"></div>
      </div></div><div class="radio-section-row-desc"><h8>The BP has been providing official standards for medicines since 1864, and provides the only comprehensive collection of authoritative official standards for UK pharmaceutical substances and medicinal products, including all the monographs and texts of the European Pharmacopoeia (Ph. Eur.).

Pharmacopoeias that have legal status within the UK are the British Pharmacopoeia (BP), including the BP (Veterinary), and the Ph. Eur. The BP is published every year in August, and becomes legally effective on January 1st of the following year.</h8></div></div>
  </label>
</div></section></div><h5>Fields of My Expertise</h5><div class="home-section-tabs"><section><div><input type="radio" id="control_01" name="select" value="1" checked="">
  <label for="control_01">
    <a href="https://www.thermofisher.com/us/en/home/life-science/protein-biology/protein-biology-learning-center/protein-biology-resource-library/pierce-protein-methods/quantitative-proteomics.html"><h2>Proteomics &amp; Proteins</h2></a>
    <p>Proteomics, the large-scale study of proteins, has been instrumental in transforming our understanding of cellular processes and functions. I have primarily utilized this powerful field to investigate host-pathogen protein-protein interactions, shedding light on the molecular mechanisms that drive disease and immune responses. I have extensive experience in extracting and analyzing small molecules, including residuals in formulated products and complex downstream purification matrices. My expertise spans a broad range of derivatization and detection methodologies, including protein electrophoresis, chromatography, spectroscopy, and mass spectrometry, ensuring precise and reliable results in even the most challenging analytical environments.</p><!--item1--><div class="radio-section-row"><div class="box"><div class="hexagon">
        <img src="images/specimen.png">
        <div class="face1"></div>
        <div class="face2"></div>
      </div></div><div class="radio-section-row-desc"><a href="https://www.biotage.com/protein-purification-in-research-and-development"><h2>Protein Purification</h2></a>Protein purification is the process of isolating a target protein from a complex mixture of biological material, essential for structural studies, functional characterization, and therapeutic development. The purification process includes several key steps:
      <li>Sample Preparation</li>
      <li>Protein Extraction</li>
      <li>Optimization and Purification</li>
      <li>Analysis and Quality Control</li>
</div></div><p></p><!--item2--><div class="radio-section-row"><div class="box"><div class="hexagon">
        <img src="images/specimen.png">
        <div class="face1"></div>
        <div class="face2"></div>
      </div></div><div class="radio-section-row-desc"><a href="https://www.bio-rad.com/webroot/web/pdf/lse/literature/pepsi_hr_1665067.pdf"><h2>Protein Expression</h2></a>My expertise encompasses both bacterial and yeast <a href="https://www.thermofisher.com/us/en/home/life-science/protein-biology/protein-expression/protein-expression-host-systems.html">expression systems</a>, each providing distinct advantages for protein production.
      <a href="https://assets.thermofisher.com/TFS-Assets/LSG/manuals/cms_070279.pdf"><li>Bacterial Expression</li></a>
Utilizing E. coli strains, bacterial expression systems offer reliable, reproducible production and purification of recombinant proteins, making them ideal for research applications.
      <a href="https://www.thermofisher.com/content/dam/LifeTech/global/life-sciences/synthetic-biology/pdfs/0913/Gene-to-Protein-Brochure.pdf"><li>Yeast Expression</li></a> Yeast systems are known for their high product yield and scalability. With easy genetic manipulation, yeast enables the production of proteins with complex properties that are often unattainable through bacterial cells.
</div></div><p></p><!--item3--><div class="radio-section-row"><div class="box"><div class="hexagon">
        <img src="images/electrophoresis-series.svg" style="filter: invert(1) sepia(1) saturate(1000%) hue-rotate(-180deg) brightness(0.9);">
        <div class="face1"></div>
        <div class="face2"></div>
      </div></div><div class="radio-section-row-desc"><h2><a href="https://www.thermofisher.com/us/en/home/life-science/protein-biology/protein-biology-learning-center/protein-biology-resource-library/pierce-protein-methods/overview-electrophoresis.html">Protein Electrophoresis</a></h2><h2>With extensive experience in the development, qualification, and validation of electrophoretic analytical methods, I am adept at tailoring assays to meet both client specifications and regulatory requirements. My expertise ensures precise and compliant solutions for diverse analytical needs.</h2>
      <a href="https://www.thermofisher.com/us/en/home/references/protocols/proteins-expression-isolation-and-analysis/sds-page-protocol/one-dimensional-sds-and-non-denaturing-gel-electrophoresis.html"><li>SDS-PAGE - Reducing / Non-Reducing</li></a>
      <a href="https://www.bio-rad.com/en-us/applications-technologies/isoelectric-focusing-2-d-electrophoresis?ID=LUSQLK2B7"><li>Isoelectric Focusing (IEF)</li></a>
      <a href="https://www.lobov.com.py/downloads/NOTA-DE-APLICACION-Electroforesis-2D-con-gradientes-de-pH-inmovilizados-utilizando-sistemas-de-enfoque-isoelectrico-IPGphor.PDF"><li>IPG Strips (immobilized pH gradient)</li></a>
      <a href="https://www.thermofisher.com/us/en/home/life-science/protein-biology/protein-biology-learning-center/protein-biology-resource-library/pierce-protein-methods/overview-western-blotting.html"><li>Immuno / Western Blotting
</li></a>
<a href="https://www.thermofisher.com/us/en/home/references/protocols/proteins-expression-isolation-and-analysis/staining-protein-gels/coomassie-staining.html"><li>Coomassie Blue Staining
</li></a>
</div></div><p></p><!--item4--><div class="radio-section-row"><div class="box"><div class="hexagon">
        <img src="images/network-diagram.svg">

function TypeWriting({ target, callback, speed, delay }) {
    const text = target.textContent;
    target.textContent = '';
    let index = 0;

    function type() {
        if (index < text.length) {
            target.textContent += text.charAt(index);
            index++;
            setTimeout(type, speed); // Use the speed parameter here
        } else if (callback) {
            setTimeout(callback, delay); // Use the delay parameter here
        }
    }

    type();
}

function startTypingLoop() {
    function startTypewriting(id, speed, delay, isFirstRound = false) {
        const element = document.getElementById(id);
        if (element) {
            TypeWriting({
                target: element,
                callback: function() {
                    console.log(`${id} typewriting finished`);
                    setTimeout(() => startTypewriting(id, speed, delay,true), 500); // Adjust the delay as needed
                },
                speed: speed,
                delay: delay,
                isFirstRound: isFirstRound
            });
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        startTypewriting('terminal', 20, 20000);

}

      if (cites) {
        return {
          el,
          cites: cites.split(' ')
        };
      } else {
        return findCites(el.parentElement)
      }
    } else {
      return undefined;
    }
  };
  var bibliorefs = window.document.querySelectorAll('a[role="doc-biblioref"]');
  for (var i=0; i<bibliorefs.length; i++) {
    const ref = bibliorefs[i];
    const citeInfo = findCites(ref);
    if (citeInfo) {
      tippyHover(citeInfo.el, function() {
        var popup = window.document.createElement('div');
        citeInfo.cites.forEach(function(cite) {
          var citeDiv = window.document.createElement('div');
          citeDiv.classList.add('hanging-indent');
          citeDiv.classList.add('csl-entry');
          var biblioDiv = window.document.getElementById('ref-' + cite);
          if (biblioDiv) {
            citeDiv.innerHTML = biblioDiv.innerHTML;
          }
          popup.appendChild(citeDiv);
        });
        return popup.innerHTML;
      });
    }
  }
});
